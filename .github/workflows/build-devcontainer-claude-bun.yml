name: Build devcontainer-claude-bun

on:
  push:
    branches:
      - master
    paths:
      - 'devcontainer-claude-bun/.devcontainer/Dockerfile'
      - 'devcontainer-claude-bun/.devcontainer/init-firewall.sh'
  workflow_dispatch:

concurrency:
  group: build-devcontainer-claude-bun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.versions.outputs.version-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract versions from Dockerfile
        id: versions
        run: |
          DOCKERFILE="devcontainer-claude-bun/.devcontainer/Dockerfile"
          BUN_VERSION=$(grep '^ARG BUN_VERSION=' "$DOCKERFILE" | cut -d'=' -f2)
          echo "version-tag=bun${BUN_VERSION}-slim" >> "$GITHUB_OUTPUT"
          echo "Bun: $BUN_VERSION"

  build:
    needs: prepare
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image-name: devcontainer-claude-bun
      context: devcontainer-claude-bun/.devcontainer
      dockerfile: devcontainer-claude-bun/.devcontainer/Dockerfile
      version-tag: ${{ needs.prepare.outputs.version-tag }}
      verify-command: 'bun --version'
    secrets: inherit
